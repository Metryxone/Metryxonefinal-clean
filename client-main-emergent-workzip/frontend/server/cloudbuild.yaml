steps:
  # Lint migration files (no DB required) — fails fast on malformed/duplicate table names
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci --prefix . && node --import tsx/esm scripts/lint-migrations.ts'
    dir: 'server'

  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/metryxone-server:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/metryxone-server:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/metryxone-server:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/metryxone-server:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'metryxone-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/metryxone-server:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'

images:
  - 'gcr.io/$PROJECT_ID/metryxone-server:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/metryxone-server:latest'
